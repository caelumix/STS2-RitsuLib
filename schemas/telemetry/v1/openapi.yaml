openapi: 3.1.0
info:
  title: RitsuLib Telemetry Ingest API
  version: 1.0.0
  summary: Reference API for RitsuLib-compatible telemetry backends.
  description: |
    This OpenAPI document describes the minimal endpoint a mod-owned telemetry backend should expose.
    RitsuLib sends one applicant-owned batch to one fixed endpoint after explicit user consent.
servers:
  - url: https://telemetry.example.com
    description: Replace with the applicant-owned backend host.
paths:
  /v1/ingest:
    post:
      operationId: ingestTelemetryBatch
      summary: Ingest a telemetry batch.
      description: |
        Accepts a batch produced by a RitsuLib telemetry adapter. The server should validate the applicant id,
        schema version, event count, event timestamps, and request ids before forwarding or storing events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryBatch'
      responses:
        '202':
          description: Batch accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAccepted'
        '200':
          description: Batch accepted synchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAccepted'
        '400':
          description: Invalid request body, schema, applicant id, or event content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '401':
          description: Authentication failed if the backend requires an additional server-side token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '413':
          description: Request body is too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '500':
          description: Server-side failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
components:
  schemas:
    TelemetryBatch:
      type: object
      additionalProperties: false
      required:
        - schema
        - applicant_id
        - events
      properties:
        schema:
          type: string
          const: ritsulib.telemetry.batch.v1
        applicant_id:
          type: string
          minLength: 1
          description: Applicant id for the destination adapter.
        events:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/TelemetryEvent'
    TelemetryEvent:
      type: object
      additionalProperties: false
      required:
        - schema
        - applicantId
        - eventName
        - requestId
        - category
        - timestampUtc
        - properties
      properties:
        schema:
          type: string
          const: ritsulib.telemetry.v1
        applicantId:
          type: string
          minLength: 1
        eventName:
          type: string
          minLength: 1
          examples:
            - session_start
            - mod_inventory
            - run_history.completed
            - exception
        requestId:
          type: string
          minLength: 1
          examples:
            - basic_usage
            - mod_inventory
            - run_history
            - diagnostics
        category:
          type: string
          minLength: 1
          examples:
            - BasicUsage
            - ModInventory
            - RunHistory
            - Diagnostics
        timestampUtc:
          type: string
          format: date-time
        properties:
          type: object
          additionalProperties: true
          description: Flat metadata. Query-critical fields should be placed here.
        payload:
          description: Structured event data. Backends may store it as JSON/blob and promote selected fields.
    IngestAccepted:
      type: object
      additionalProperties: false
      required:
        - ok
        - accepted
      properties:
        ok:
          type: boolean
          const: true
        accepted:
          type: integer
          minimum: 0
        rejected:
          type: integer
          minimum: 0
          default: 0
        request_id:
          type: string
          description: Optional backend-side request id for log correlation.
    IngestError:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - invalid_schema
            - invalid_applicant
            - too_many_events
            - payload_too_large
            - upstream_failed
        message:
          type: string
        request_id:
          type: string
