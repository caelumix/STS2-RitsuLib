name: RitsuLib CI build
description: >-
  Installs toolchain + caches, then runs scripts/ci/ci_build.py (signature
  verification + release_cli --artifacts-only with explicit MSBuild overrides).

inputs:
  signatures-root:
    description: Absolute path for Sts2ApiSignatureRoot (versioned folders with sts2.dll).
    required: true
  use-dev-version:
    description: Build artifacts with dev-only package version (9999.0.0-dev.<run>+<sha>).
    required: false
    default: "false"
  upload-artifact:
    description: Upload artifacts/github and artifacts/nuget as a GitHub Actions artifact.
    required: false
    default: "true"
  artifact-retention-days:
    description: Number of days to retain the uploaded Actions artifact.
    required: false
    default: "30"

runs:
  using: composite
  steps:
    - uses: actions/setup-dotnet@v5.3.0
      with:
        dotnet-version: "9.x"

    - uses: actions/cache@v5.0.5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('STS2-RitsuLib.csproj') }}

    - uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        activate-environment: true
        no-project: true
        cache-dependency-glob: |
          scripts/**/*.py

    - name: CI build (scripted)
      shell: bash
      working-directory: ${{ github.workspace }}
      run: >
        extra=""; if [[ "${{ inputs.use-dev-version }}" == "true" ]]; then extra="--use-dev-version"; fi;
        uv run python scripts/ci/ci_build.py
        --repo-root "${{ github.workspace }}"
        --signature-root "${{ inputs.signatures-root }}"
        $extra

    - name: Resolve artifact name
      if: ${{ inputs.upload-artifact == 'true' }}
      id: artifact
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        short_sha="$(git rev-parse --short=12 HEAD)"
        echo "name=ritsulib-${short_sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

    - name: Upload build artifacts
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ${{ steps.artifact.outputs.name }}
        path: |
          artifacts/github/**
          artifacts/nuget/**
        if-no-files-found: error
        retention-days: ${{ inputs.artifact-retention-days }}
