openapi: 3.1.0
info:
  title: RitsuLib Telemetry Ingest API
  version: 1.0.0
  summary: Reference API for RitsuLib-compatible telemetry backends.
  description: |
    This OpenAPI document describes the minimal endpoint a mod-owned telemetry backend should expose.
    RitsuLib sends one applicant-owned batch to one fixed endpoint after explicit user consent.
servers:
  - url: https://telemetry.example.com
    description: Replace with the applicant-owned backend host.
paths:
  /v1/ingest:
    post:
      operationId: ingestTelemetryBatch
      summary: Ingest a telemetry batch.
      description: |
        Accepts a batch produced by a RitsuLib telemetry adapter. The server should validate the applicant id,
        schema version, event count, event timestamps, and request ids before forwarding or storing events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryBatch'
      responses:
        '202':
          description: Batch accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAccepted'
        '200':
          description: Batch accepted synchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAccepted'
        '400':
          description: Invalid request body, schema, applicant id, or event content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '401':
          description: Authentication failed if the backend requires an additional server-side token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '413':
          description: Request body is too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
        '500':
          description: Server-side failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestError'
components:
  schemas:
    TelemetryBatch:
      type: object
      additionalProperties: false
      required:
        - schema
        - applicant_id
        - events
      properties:
        schema:
          type: string
          const: ritsulib.telemetry.batch.v1
        applicant_id:
          type: string
          minLength: 1
          description: Applicant id for the destination adapter.
        events:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/TelemetryEvent'
    TelemetryEvent:
      type: object
      additionalProperties: false
      required:
        - schema
        - applicantId
        - eventName
        - requestId
        - category
        - timestampUtc
        - properties
      properties:
        schema:
          type: string
          const: ritsulib.telemetry.v1
        applicantId:
          type: string
          minLength: 1
        eventName:
          type: string
          minLength: 1
          examples:
            - session_start
            - mod_inventory
            - run_history.completed
            - exception
        requestId:
          type: string
          minLength: 1
          examples:
            - basic_usage
            - mod_inventory
            - run_history
            - diagnostics
        category:
          type: string
          minLength: 1
          examples:
            - BasicUsage
            - ModInventory
            - RunHistory
            - Diagnostics
        timestampUtc:
          type: string
          format: date-time
        properties:
          $ref: '#/components/schemas/TelemetryProperties'
        payload:
          $ref: '#/components/schemas/TelemetryPayload'
    TelemetryProperties:
      type: object
      additionalProperties: true
      description: Flat metadata. Query-critical fields should be indexed first by backends.
      properties:
        anonymous_install_id:
          type: string
          description: Stable anonymous install id generated by RitsuLib.
        session_id:
          type: string
          description: Per-process session id generated by RitsuLib.
        ritsulib_version:
          type: string
        ritsulib_informational_version:
          type: string
        ritsulib_build_channel:
          type: string
          examples:
            - release
            - dev
            - local_debug
        ritsulib_build_configuration:
          type: string
          examples:
            - Release
            - Debug
        applicant_id:
          type: string
        owner_mod_id:
          type: string
        applicant_display_name:
          type: string
        game_version:
          type:
            - string
            - 'null'
        game_release_label:
          type:
            - string
            - 'null'
        platform:
          type: string
        os_name:
          type:
            - string
            - 'null'
        os_version:
          type: string
        process_architecture:
          type: string
        dotnet_runtime:
          type: string
        game_language:
          type:
            - string
            - 'null'
        startup_snapshot_at_utc:
          type: string
          format: date-time
        registered_mod_count:
          type: integer
          minimum: 0
        loaded_mod_count:
          type: integer
          minimum: 0
        disabled_mod_count:
          type: integer
          minimum: 0
        failed_mod_count:
          type: integer
          minimum: 0
        added_at_runtime_mod_count:
          type: integer
          minimum: 0
        gameplay_mod_count:
          type: integer
          minimum: 0
        payload_kind:
          type: string
          examples:
            - vanilla_run_history
            - exception
        json_indented:
          type: boolean
        is_victory:
          type: boolean
        is_abandoned:
          type: boolean
        occurred_at_utc:
          type: string
          format: date-time
        run_game_mode:
          type: string
        run_is_daily:
          type: boolean
        run_player_count:
          type: integer
          minimum: 0
        run_floor_reached:
          type: integer
        run_ascension:
          type: integer
        run_time_seconds:
          type: number
        run_win_time_seconds:
          type: number
        run_reload_count:
          type: integer
          minimum: 0
        run_character_ids:
          type: array
          items:
            type: string
        capture_source:
          type: string
        exception_type:
          type: string
    TelemetryPayload:
      description: Structured event data. Backends may store it as JSON/blob and promote selected fields.
      oneOf:
        - type: object
          additionalProperties: true
          properties:
            base_payload:
              $ref: '#/components/schemas/BasePayload'
            private_contributions:
              type: object
              additionalProperties: true
            shared_contributions:
              type: object
              additionalProperties: true
            applicant_payload:
              description: Applicant-owned payload for the event.
        - type: array
        - type: string
        - type: number
        - type: boolean
        - type: 'null'
    BasePayload:
      type: object
      additionalProperties: true
      description: RitsuLib-provided category payload. ModInventory events include full registered mods and a loaded-only compatibility list.
      properties:
        mods:
          type: array
          items:
            $ref: '#/components/schemas/ModInventoryEntry'
        loaded_mods:
          type: array
          items:
            $ref: '#/components/schemas/ModInventoryEntry'
    ModInventoryEntry:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        author:
          type:
            - string
            - 'null'
        version:
          type:
            - string
            - 'null'
        load_state:
          type: string
        state:
          type: string
          description: Compatibility alias for load_state.
        is_loaded:
          type: boolean
        source:
          type: string
        affects_gameplay:
          type: boolean
        has_dll:
          type:
            - boolean
            - 'null'
        has_pck:
          type:
            - boolean
            - 'null'
        min_game_version:
          type:
            - string
            - 'null'
        dependencies:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
              min_version:
                type:
                  - string
                  - 'null'
        assembly:
          type:
            - string
            - 'null'
        assembly_version:
          type:
            - string
            - 'null'
        error_count:
          type: integer
          minimum: 0
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ModInventoryError'
    ModInventoryError:
      type: object
      additionalProperties: false
      properties:
        table:
          type:
            - string
            - 'null'
        key:
          type:
            - string
            - 'null'
        variables:
          type: object
          additionalProperties: true
    IngestAccepted:
      type: object
      additionalProperties: false
      required:
        - ok
        - accepted
      properties:
        ok:
          type: boolean
          const: true
        accepted:
          type: integer
          minimum: 0
        rejected:
          type: integer
          minimum: 0
          default: 0
        request_id:
          type: string
          description: Optional backend-side request id for log correlation.
    IngestError:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - invalid_schema
            - invalid_applicant
            - too_many_events
            - payload_too_large
            - upstream_failed
        message:
          type: string
        request_id:
          type: string
